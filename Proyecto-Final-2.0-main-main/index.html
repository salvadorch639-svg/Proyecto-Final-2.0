<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escena Policial 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

canvas{
    display:block;
}

#audio-controls {
    position: fixed;
    left: 16px;
    top: 16px;
    z-index: 10;
    background: rgba(6, 9, 20, 0.92);
    color: #f0f4ff;
    padding: 14px;
    border-radius: 12px;
    font-size: 0.95rem;
    max-width: 260px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
}

#audio-controls h3 {
    margin: 0 0 8px;
    font-size: 1rem;
}

#audio-controls label,
#audio-controls button,
#audio-controls input {
    display: block;
    width: 100%;
}

#audio-controls button {
    margin: 6px 0;
    padding: 8px 10px;
    border: none;
    border-radius: 6px;
    background: #32415a;
    color: #fff;
    cursor: pointer;
}

#audio-controls button:hover {
    background: #48617f;
}

#audio-controls input[type="range"] {
    margin: 6px 0 10px;
}

#audio-track-list {
    margin-top: 10px;
}

#audio-track-list label {
    margin-bottom: 6px;
    cursor: pointer;
}
</style>

<script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1.8.3/dist/es-module-shims.js"></script>
<script type="importmap-shim">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/controls/OrbitControls.js",
    "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.18.0/dist/lil-gui.esm.min.js"
  }
}
</script>

</head>
<body>

<div id="audio-controls">
  <h3>Controles de audio</h3>
  <button id="play-pause">Reproducir</button>
  <button id="mute-button">Silenciar</button>
  <div>
    <label>Volumen: <span id="volume-value">10%</span></label>
    <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.1">
  </div>
  <div id="audio-status">Pausado</div>
  <div id="audio-track-list">
    <label><input type="checkbox" checked> Ambiente de ciudad</label>
    <label><input type="checkbox" checked> Sirena policial</label>
    <label><input type="checkbox" checked> Lluvia realista</label>
    <label><input type="checkbox" checked> Trueno</label>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
<script type="module-shim" src="main.js"></script>

</body>
</html>
